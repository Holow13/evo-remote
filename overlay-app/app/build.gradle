plugins {
    id "com.android.application"
}

android {
    namespace "com.evo.remote.timeroverlay"
    compileSdk 34

    defaultConfig {
        applicationId "com.evo.remote.timeroverlay"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "androidx.core:core:1.12.0"
}
